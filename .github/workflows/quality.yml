# SPDX-License-Identifier: MPL-2.0
name: Code Quality

on:
  push:
    branches: [main, develop, deno-migration-final]
  pull_request:
    branches: [main, develop, deno-migration-final]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e # v6.0.1
      
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x
      
      - name: Run linter
        run: deno lint src/ tests/
      
      - name: Check formatting
        run: deno fmt --check src/ tests/
      
      - name: Check for TODOs
        run: |
          echo "=== Checking for TODO/FIXME markers ==="
          grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.js" --include="*.json" . || echo "No markers found"
