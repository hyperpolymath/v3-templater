#
# Stapeln selur-compose.toml — v3-templater
# CLI templating engine (no exposed ports)

[project]
name = "v3-templater"

[services.app]
build = { context = ".", dockerfile = "Containerfile" }
restart = "no"
networks = ["default"]

healthcheck = { test = "node dist/cli.js --version || exit 1", interval = "30s", timeout = "3s", start_period = "5s", retries = 3 }

[services.app.labels]
"org.opencontainers.image.title" = "v3-templater"
"org.opencontainers.image.description" = "Modern, secure templating engine"

[networks.default]
driver = "bridge"
